name: AI Website Builder
on:
  workflow_dispatch:
    inputs:
      site_idea:
        description: 'وصف الموقع'
        required: true
        default: 'موقع بسيط'

jobs:
  create-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Call Gemini AI
        run: |
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
          -H 'Content-Type: application/json' \
          -d '{
            "contents": [{
              "parts":[{
                "text": "Write a complete single-file HTML website with CSS and JS for: ${{ github.event.inputs.site_idea }}. Give me ONLY the raw HTML code. Do NOT use markdown. Start with <!DOCTYPE html>."
              }]
            }]
          }')
          
          # فحص إذا كان الرد يحتوي على خطأ
          if echo "$RESPONSE" | grep -q "error"; then
            echo "حدث خطأ من جوجل: $RESPONSE"
            exit 1
          fi
          
          # استخراج الكود وحفظه
          echo "$RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data['candidates'][0]['content']['parts'][0]['text'])" > index.html
          
          # تنظيف أي علامات زائدة
          sed -i 's/```html//g' index.html
          sed -i 's/```//g' index.html

      - name: Commit and Push
        run: |
          git config --global user.name "AI-Agent"
          git config --global user.email "ai@agent.com"
          git add index.html
          git commit -m "New site created" || echo "No changes"
          git push
