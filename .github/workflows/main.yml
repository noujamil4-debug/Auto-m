name: AI Website Builder
on:
  workflow_dispatch:
    inputs:
      site_idea:
        description: 'وصف الموقع'
        required: true
        default: 'موقع بسيط'

jobs:
  create-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Call Gemini AI
        run: |
          # هذه المرة سنستخدم v1 الرسمي مع flash
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
          -H 'Content-Type: application/json' \
          -d '{
            "contents": [{
              "parts":[{
                "text": "Write a complete single-file HTML website with CSS for: ${{ github.event.inputs.site_idea }}. Give me ONLY the HTML code. Do NOT use markdown code blocks."
              }]
            }]
          }')
          
          # فحص إذا كان هناك رد فعلي
          echo "Response: $RESPONSE"
          
          # استخراج الكود وحفظه باستخدام طريقة أكثر أماناً
          echo "$RESPONSE" | python3 -c "import sys, json; data=json.load(sys.stdin); print(data['candidates'][0]['content']['parts'][0]['text'])" > index.html
          
          # تنظيف الكود
          sed -i 's/```html//g' index.html
          sed -i 's/```//g' index.html

      - name: Commit and Push
        run: |
          git config --global user.name "AI-Agent"
          git config --global user.email "ai@agent.com"
          git add index.html
          git commit -m "Site Update" || echo "No changes"
          git push
